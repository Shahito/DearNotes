<!-- public/index.html -->
<!DOCTYPE html>
<html lang="fr" data-i18n-title="page.title.login">
<head>
  <meta charset="UTF-8">
  <title>DearNotes - Connexion</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="/images/tab/tab-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#eb9399" />
  <script src="js/i18n.js"></script>
</head>
<body>
  <main id="loginMain">
    <div id="logoSection">
      <img src="/images/logo/logo.png" alt="Logo DearNotes"/>
      <h1>DearNotes</h1>
    </div>
    <div id="loginSection">
      <h2 data-i18n="login.login_title">Connexion</h2>
      <form id="loginForm">
        <input type="text" id="username" data-i18n="login.username" data-i18n-attr="placeholder" autocomplete="name" required>
        <div class="input-view-wrapper">
          <input id="password" type="password" data-i18n="login.password" data-i18n-attr="placeholder" required>
          <span id="toggle-password" class="view-toggle" tabindex="0"></span>
        </div>
        <p class="message"></p>
        <button type="submit" data-i18n="login.login_btn"></button>
      </form>
      <p id="registerSwitch" tabindex="0" data-i18n="login.register_switch"></p>
    </div>

    <div id="registerSection" class="hidden">
      <h2 data-i18n="login.register_title"></h2>
      <form id="registerForm">
        <input id="usernameRegister" type="text" data-i18n="login.username" data-i18n-attr="placeholder" required>
        <div class="input-view-wrapper">
          <input id="passwordRegister" type="password" data-i18n="login.password" data-i18n-attr="placeholder" required>
          <span id="toggle-passwordRegister" class="view-toggle" tabindex="0"></span>
        </div>
        <p class="message"></p>
        <button type="submit" data-i18n="login.register_btn"></button>
      </form>
      <p id="loginSwitch" tabindex="0" data-i18n="login.login_switch"></p>
    </div>
  </main>

  <script>
    initI18n();
  </script>
  <script src="js/app.js"></script>
  <script src="js/form_switch.js"></script>
  <script src="js/input_type_toggle.js"></script>
  <script>
    (async () => {
      try {
        const me = await api('/auth/me');
        if (me.user) window.location = '/board.html';
      } catch(e) {
        return;
      }
    })();

    toggle("password");
    toggle("passwordRegister");
    document.getElementById("loginForm").addEventListener("submit", async (e)=>{
      e.preventDefault();
      login();
    });
    document.getElementById("registerForm").addEventListener("submit", async (e)=>{
      e.preventDefault();
      register();
    });

    const loginMessage = document.querySelector('#loginForm .message');
    const registerMessage = document.querySelector('#registerForm .message');
    
    async function login() {
      try {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await api('/auth/login', {
          method: 'POST',
          body: { username, password }
        });
        if (res.success) window.location = '/board.html';
      } catch (e) {
        loginMessage.textContent = t("error." + e.message) || t("error.UNKNOWN");
        loginMessage.classList.add('visible');
        loginMessage.classList.remove('shake');
        void loginMessage.offsetWidth;
        loginMessage.classList.add('shake');
      }
    }

    async function register() {
      try {
        const username = document.getElementById('usernameRegister').value;
        const password = document.getElementById('passwordRegister').value;
        const res = await api('/auth/register', {
          method: 'POST',
          body: { username, password }
        });
        if (res.success) {
          registerMessage.textContent = t("login.register_success");
          registerMessage.classList.add('visible');
          registerMessage.classList.add('success');
        }
      } catch (e) {
        registerMessage.textContent = t("error." + e.message) || t("error.UNKNOWN");
        registerMessage.classList.remove('success');
        registerMessage.classList.add('visible');
        registerMessage.classList.remove('shake');
        void registerMessage.offsetWidth;
        registerMessage.classList.add('shake');
      }
    }
  </script>
</body>
</html>
