<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DearNotes - Aide</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="/images/tab/tab-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
</head>
<body>
  <header>
    <nav id="menu" class="closed">
      <a href="board.html" tabindex="-1"><button>Nos notes</button></a>
      <button onclick="logout()">Déconnexion</button>
    </nav>
    <button id="menuTrigger" class="closed" tabindex="1">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 512" alt="Icône menu">
        <path d="M64 360c30.9 0 56 25.1 56 56s-25.1 56-56 56s-56-25.1-56-56s25.1-56 56-56zm0-160c30.9 0 56 25.1 56 56s-25.1 56-56 56s-56-25.1-56-56s25.1-56 56-56zM120 96c0 30.9-25.1 56-56 56S8 126.9 8 96S33.1 40 64 40s56 25.1 56 56z"></path>
      </svg>
    </button>
  </header>

  <main id="settingsMain">
    <section id="statsSection">
    <h1>Aide</h1>
    <div id="help">
      <a href="mentions-legales.html" tabindex="-1"><button>Accéder aux mentions légales</button></a>
      <a href="mailto:admin@shabox.dev" id="reportBug" tabindex="-1">
        <button>Signaler un problème</button>
      </a>
      <button type="button" onclick="window.openPatchnotesManual()" id="versionButton">Version 1.0.0</button>
    </div>
  </section>
  <section id="patchNotesOverlay" class="patchnotes-hidden">
    <div class="patchnotes-modal">
      <h2 id="patchnotes-title"></h2>
      <div class="pn-carousel">
        <button id="pn-prev" class="pn-arrow" aria-label="Previous">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <path d="M16.1795 3.26875C15.7889 2.87823 15.1558 2.87823 14.7652 3.26875L8.12078 9.91322C6.94952 11.0845 6.94916 12.9833 8.11996 14.155L14.6903 20.7304C15.0808 21.121 15.714 21.121 16.1045 20.7304C16.495 20.3399 16.495 19.7067 16.1045 19.3162L9.53246 12.7442C9.14194 12.3536 9.14194 11.7205 9.53246 11.33L16.1795 4.68297C16.57 4.29244 16.57 3.65928 16.1795 3.26875Z" fill="#0F0F0F"/>
          </svg>
        </button>
        <div class="pn-viewport">
          <div id="pn-track" class="pn-track"></div>
        </div>
        <button id="pn-next" class="pn-arrow" aria-label="Next">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <path d="M16.1795 3.26875C15.7889 2.87823 15.1558 2.87823 14.7652 3.26875L8.12078 9.91322C6.94952 11.0845 6.94916 12.9833 8.11996 14.155L14.6903 20.7304C15.0808 21.121 15.714 21.121 16.1045 20.7304C16.495 20.3399 16.495 19.7067 16.1045 19.3162L9.53246 12.7442C9.14194 12.3536 9.14194 11.7205 9.53246 11.33L16.1795 4.68297C16.57 4.29244 16.57 3.65928 16.1795 3.26875Z" fill="#0F0F0F"/>
          </svg>
        </button>
      </div>
      <div id="pn-dots" class="pn-dots"></div>
      <button id="patchnotesClose">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <path d="M6 6L18 18M18 6L6 18" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/patchnotes.js"></script>
  <script>
    async function initVersion() {
      try {
        const res = await fetch("/api/patchnotes");
        const { patchnotes } = await res.json();

        const version = patchnotes.version;

        const link = document.getElementById("reportBug");
        const versionButton = document.getElementById("versionButton");

        link.href =
          `mailto:admin@shabox.dev?subject=Bug%20DearNotes&body=Version%3A%20${encodeURIComponent(version)}%0A%0AExpliquez%20le%20problème%20(Vous%20pouvez%20ajouter%20des%20images%20si%20nécessaire):`;
        if(versionButton) versionButton.innerText = `Version ${encodeURIComponent(version)}`;

      } catch (err) {
        console.error("Impossible de récupérer la version", err);
        if(versionButton) versionButton.innerText = "Version 1.0.0";
      }
    }

    initVersion();
    </script>
</body>
</html>
