<!-- public/board.html -->
<!DOCTYPE html>
<html lang="fr" data-i18n-title="page.title.board">
<head>
  <meta charset="UTF-8">
  <title>DearNotes - Mur</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="/images/tab/tab-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#eb9399" />
  <script src="js/i18n.js"></script>
</head>
<body>
  <header>
    <nav id="menu" class="closed">
      <a href="write.html" tabindex="-1"><button data-i18n="menu.add_note"></button></a>
      <a href="settings.html" tabindex="-1"><button data-i18n="menu.settings"></button></a>
      <a href="help.html" tabindex="-1"><button data-i18n="menu.help"></button></a>
      <button onclick="logout()" data-i18n="menu.logout"></button>
    </nav>
    <button id="menuTrigger" class="closed" tabindex="1">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 512" alt="Icône menu">
        <path d="M64 360c30.9 0 56 25.1 56 56s-25.1 56-56 56s-56-25.1-56-56s25.1-56 56-56zm0-160c30.9 0 56 25.1 56 56s-25.1 56-56 56s-56-25.1-56-56s25.1-56 56-56zM120 96c0 30.9-25.1 56-56 56S8 126.9 8 96S33.1 40 64 40s56 25.1 56 56z"></path>
      </svg>
    </button>
  </header>
  <main id="home">
    <div id='notes-trigger'></div>
    <div id="memory"></div>
  </main>
  <section id="patchNotesOverlay" class="patchnotes-hidden">
    <div class="patchnotes-modal">
      <h2 id="patchnotes-title"></h2>
      <div class="pn-carousel">
        <button id="pn-prev" class="pn-arrow" aria-label="Previous">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <path d="M16.1795 3.26875C15.7889 2.87823 15.1558 2.87823 14.7652 3.26875L8.12078 9.91322C6.94952 11.0845 6.94916 12.9833 8.11996 14.155L14.6903 20.7304C15.0808 21.121 15.714 21.121 16.1045 20.7304C16.495 20.3399 16.495 19.7067 16.1045 19.3162L9.53246 12.7442C9.14194 12.3536 9.14194 11.7205 9.53246 11.33L16.1795 4.68297C16.57 4.29244 16.57 3.65928 16.1795 3.26875Z" fill="#0F0F0F"/>
          </svg>
        </button>
        <div class="pn-viewport">
          <div id="pn-track" class="pn-track"></div>
        </div>
        <button id="pn-next" class="pn-arrow" aria-label="Next">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <path d="M16.1795 3.26875C15.7889 2.87823 15.1558 2.87823 14.7652 3.26875L8.12078 9.91322C6.94952 11.0845 6.94916 12.9833 8.11996 14.155L14.6903 20.7304C15.0808 21.121 15.714 21.121 16.1045 20.7304C16.495 20.3399 16.495 19.7067 16.1045 19.3162L9.53246 12.7442C9.14194 12.3536 9.14194 11.7205 9.53246 11.33L16.1795 4.68297C16.57 4.29244 16.57 3.65928 16.1795 3.26875Z" fill="#0F0F0F"/>
          </svg>
        </button>
      </div>
      <div id="pn-dots" class="pn-dots"></div>
      <button id="patchnotesClose">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <path d="M6 6L18 18M18 6L6 18" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </section>
  <section id="coupleZone" class="hidden">
    <h2>Couple</h2>
    <form id="joinCoupleForm">
      <input id="inviteCode"  data-i18n="couple.join_placeholder" data-i18n-attr="placeholder" required>
      <button id="joinCoupleBtn" type='submit' data-i18n="couple.join_btn"></button>
    </form>
    <div id="createCoupleSection">
      <button id="createCoupleBtn" data-i18n="couple.create_btn"></button>
      <p data-i18n="couple.create_hint"></p>
    </div>
    <div id="coupleInfo">
      <p data-i18n="couple.share_hint"></p>
      <p id="coupleCode"></p>
      <button id="copyCoupleCode" data-i18n="couple.copy_btn"></button>
    </div>
  </section>

  <script>
    initI18n();
  </script>
  <script src="js/app.js"></script>
  <script src="js/patchnotes.js"></script>
  <script src="js/board.js"></script>
  <script src="js/menu.js"></script>
  <script>
    const documentHeight = () => {
        const doc=document.documentElement
        doc.style.setProperty('--real-vh', `${window.innerHeight}px`)
    }
    window.addEventListener('resize',documentHeight)
    documentHeight()
  </script>
</body>
</html>
